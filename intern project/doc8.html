<!DOCTYPE html>
<html>

<head>
    <title>Open Scenario</title>
    <link rel="stylesheet" href="style8.css">
</head>

<body>

    <div id="container">

        <div id="open">
            <h2>Open Scenario</h2>
            <button>X</button>
        </div>

        <div id="content">

            <h3>Search Scenario</h3>

            <div id="section">

                <div id="scenario">

                    <label><strong>Scenario Name:</strong></label>
                    <br>

                    <input type="text" id="sn" placeholder="Enter Scenario Name">

                </div>

                <div id="execution">

                    <label><strong>Execution Date:</strong></label>
                    <br>

                    <input type="date" id="ed">

                </div>

                <button id="button" onclick="showTable()">
                    Search
                </button>
                <p id="message"></p>
                <div id="table">
                    <table>
                        <tr>
                            <th>S.no</th>
                            <th>Scenario name</th>
                            <th>Execution Date</th>
                            <th>Start time</th>
                            <th>End time</th>
                            <th>Description</th>
                            <th>Status</th>
                        </tr>
                        <tr>
                            <td>1</td>
                            <td>Flight</td>
                            <td>20/06/2026</td>
                            <td>10:00AM</td>
                            <td>11:00AM</td>
                            <td>Emergency landing</td>
                            <td>🔴Failure</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Car accident</td>
                            <td>20/06/2026</td>
                            <td>10:00AM</td>
                            <td>11:00AM</td>
                            <td>Emergency landing</td>
                            <td>🟢Success</td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>Fire</td>
                            <td>20/06/2026</td>
                            <td>10:00AM</td>
                            <td>11:00AM</td>
                            <td>Emergency landing</td>
                            <td>🟡Pending</td>
                        </tr>
                    </table>
                    <button>Replay</button>
                    <button>view screenshot</button>

                </div>

            </div>

        </div>

    </div>
    <script src="back.js"></script>

</body>

</html>
