<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Scenario</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#f3f5f7;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:1000px;
    background:white;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
    overflow:hidden;
}

.header{
    background:#3da30d;
    color:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header button{
    background:none;
    border:none;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.content{
    padding:25px;
}

h3{
    margin-bottom:20px;
    color:#1f1f1f;
}

.search-section{
    display:flex;
    gap:20px;
    align-items:end;
    flex-wrap:wrap;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:8px;
    font-weight:600;
}

.input-group input{
    width:250px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

.search-btn{
    background:#3d7f3f;
    color:white;
    border:none;
    padding:10px 25px;
    border-radius:6px;
    cursor:pointer;
}

.search-btn:hover{
    background:#1c5323;
}

.results{
    margin-top:30px;
    display:none;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2a7436;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

tr:nth-child(even){
    background:#f8f8f8;
}

.buttons{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.buttons button{
    padding:12px 24px;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.replay{
    background:#28a745;
}

.screenshot{
    background:#007bff;
}

.message{
    color:red;
    margin-top:15px;
    display:none;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Open Scenario</h2>
        <button>✕</button>
    </div>

    <div class="content">

        <h3>Search Scenario</h3>

        <div class="search-section">

            <div class="input-group">
                <label>Scenario Name</label>
                <input
                    type="text"
                    id="scenarioName"
                    placeholder="Enter Scenario Name">
            </div>

            <div class="input-group">
                <label>Execution Date</label>
                <input
                    type="date"
                    id="executionDate">
            </div>

            <button
                class="search-btn"
                onclick="searchScenario()">
                Search
            </button>

        </div>

        <div class="message" id="errorMessage">
            Please enter a scenario name.
        </div>

        <div class="results" id="resultsSection">

            <table>

                <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Scenario Name</th>
                        <th>Execution Date</th>
                        <th>Start Time</th>
                        <th>End Time</th>
                        <th>Description</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>1</td>
                        <td>Air Patrol Alpha</td>
                        <td>05-06-2023</td>
                        <td>09:00</td>
                        <td>10:30</td>
                        <td>Training Mission</td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>Recon Bravo</td>
                        <td>08-06-2023</td>
                        <td>13:00</td>
                        <td>15:00</td>
                        <td>Recon Operation</td>
                    </tr>

                    <tr>
                        <td>3</td>
                        <td>Emergency Response</td>
                        <td>12-06-2023</td>
                        <td>11:15</td>
                        <td>12:45</td>
                        <td>Emergency Drill</td>
                    </tr>

                </tbody>

            </table>

            <div class="buttons">

                <button class="replay">
                    ▶ Replay
                </button>

                <button class="screenshot">
                    📷 View Screenshots
                </button>

            </div>

        </div>

    </div>

</div>

<script>

function searchScenario(){

    let scenario =
    document.getElementById("scenarioName").value;

    if(scenario.trim() === ""){

        document.getElementById("errorMessage")
        .style.display = "block";

        document.getElementById("resultsSection")
        .style.display = "none";

        return;
    }

    document.getElementById("errorMessage")
    .style.display = "none";

    document.getElementById("resultsSection")
    .style.display = "block";
}

</script>

</body>
</html>
