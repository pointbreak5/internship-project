<!DOCTYPE html>
<html>

<head>
    <title>Open Scenario</title>
    <link rel="stylesheet" href="style7.css">
</head>

<body>

    <div id="container">

        <div id="open">
            <h2>Open Scenario</h2>
            <button>X</button>
        </div>

        <div id="content">

            <h3>Search Scenario</h3>

            <div id="section">

                <div id="scenario">

                    <label>Scenario Name:</label>
                    <br>

                    <input
                        type="text"
                        id="sn"
                        placeholder="Enter Scenario Name">

                </div>

                <div id="execution">

                    <label>Execution Date:</label>
                    <br>

                    <input type="date" id="ed">

                </div>

                   <button id="button">
                        Search
                </button>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
